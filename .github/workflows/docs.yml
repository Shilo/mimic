name: Docs

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docs.yml"
      - "addons/mimic/**/*.gd"
      - "docs/**"
      - "examples/**"
      - "tools/export_web_example.ps1"
      - "tools/generate_api_docs.py"
      - "tools/godot.ps1"
      - "tools/mkdocs_hooks.py"
      - "export_presets.cfg"
      - "mkdocs.yml"
      - "requirements-docs.txt"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/docs.yml"
      - "addons/mimic/**/*.gd"
      - "docs/**"
      - "examples/**"
      - "tools/export_web_example.ps1"
      - "tools/generate_api_docs.py"
      - "tools/godot.ps1"
      - "tools/mkdocs_hooks.py"
      - "export_presets.cfg"
      - "mkdocs.yml"
      - "requirements-docs.txt"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: "pip"

      - name: Install docs dependencies
        run: python -m pip install -r requirements-docs.txt

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: true

      - name: Import Godot project
        run: godot --headless --import --path .

      - name: Build documentation
        env:
          MIMIC_DOCS_SITE_URL: ${{ steps.pages.outputs.base_url }}/
          MIMIC_DOCS_REPO_URL: https://github.com/${{ github.repository }}
          MIMIC_DOCS_REPO_NAME: ${{ github.repository }}
        run: mkdocs build --strict

      - name: Export playable web example
        shell: pwsh
        run: ./tools/export_web_example.ps1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
